
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#F5F0E8;--ink:#1C1713;--umber:#6B5E52;
    --brass:#B8975A;--rule:#C9B99A;
  }
  body{background:var(--bg);font-family:'Jost',sans-serif;font-weight:300;}

  .page{width:100%;min-height:600px;position:relative;overflow:hidden;}

  /* Hero background — switches on hover */
  .hero-bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center top;
    filter:sepia(15%) contrast(95%) grayscale(20%);
    transition:opacity 0.55s ease;
  }
  .hero-bg.outgoing{opacity:0;}

  /* Vignette */
  .vignette{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at center, rgba(13,11,9,0.18) 0%, rgba(13,11,9,0.72) 100%);
    z-index:1;pointer-events:none;
  }

  /* Artisan info overlay */
  .artisan-info{
    position:absolute;bottom:130px;left:60px;
    z-index:3;color:var(--bg);
    opacity:0;transform:none;
    transition:opacity 0.45s ease;
  }
  .artisan-info.visible{opacity:1;}
  .info-label{
    font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--brass);margin-bottom:10px;
  }
  .info-rule{width:40px;height:1px;background:var(--brass);margin-bottom:16px;}
  .info-name{
    font-family:'Cormorant Garamond',serif;font-weight:300;
    font-size:52px;letter-spacing:0.1em;line-height:1.1;
    color:var(--bg);margin-bottom:8px;
  }
  .info-role{
    font-size:12px;letter-spacing:0.2em;text-transform:uppercase;
    color:rgba(245,240,232,0.65);margin-bottom:14px;
  }
  .info-bio{
    font-size:14px;color:rgba(245,240,232,0.75);
    max-width:360px;line-height:1.8;
  }

  /* Slide counter */
  .counter{
    position:absolute;bottom:110px;right:60px;
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:11px;letter-spacing:0.18em;
    color:rgba(245,240,232,0.55);z-index:3;
    transition:opacity 0.3s ease;
  }

  /* Filmstrip bar */
  .filmstrip{
    position:absolute;bottom:0;left:0;right:0;
    height:90px;
    background:rgba(13,11,9,0.55);
    backdrop-filter:blur(0px);
    border-top:1px solid rgba(200,185,154,0.18);
    z-index:4;
    display:flex;align-items:center;
    padding:0 20px;
    overflow-x:auto;
    scrollbar-width:none;
    gap:4px;
  }
  .filmstrip::-webkit-scrollbar{display:none;}

  /* Each filmstrip thumb */
  .thumb{
    flex-shrink:0;
    width:52px;height:66px;
    background-size:cover;background-position:center top;
    filter:sepia(20%) grayscale(40%) brightness(0.75);
    border:1.5px solid transparent;
    cursor:pointer;
    transition:
      width 0.35s ease,
      height 0.35s ease,
      filter 0.35s ease,
      border-color 0.3s ease,
      transform 0.35s ease;
    position:relative;
    transform-origin:bottom center;
  }
  .thumb:hover{
    width:68px;height:80px;
    filter:sepia(8%) grayscale(0%) brightness(1);
    border-color:var(--brass);
    transform:translateY(-4px);
    z-index:2;
  }
  .thumb.active{
    border-color:var(--brass);
    filter:sepia(8%) grayscale(0%) brightness(1);
  }

  /* Nav (static header strip) */
  .nav-strip{
    position:absolute;top:0;left:0;right:0;
    padding:22px 60px;
    display:flex;justify-content:space-between;align-items:center;
    z-index:5;
  }
  .nav-logo-text{
    font-family:'Jost',sans-serif;font-weight:300;font-size:11px;
    letter-spacing:0.12em;text-transform:uppercase;
    color:rgba(245,240,232,0.85);line-height:1.5;
  }
  .nav-links-row{display:flex;gap:32px;}
  .nav-link{
    font-family:'Jost',sans-serif;font-weight:300;font-size:11px;
    letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(245,240,232,0.65);
    text-decoration:none;transition:color 0.3s;
  }
  .nav-link:hover,.nav-link.active{color:var(--bg);}
  .nav-link.active{border-bottom:1px solid var(--brass);padding-bottom:2px;}
</style>

<div class="page" id="artisanPage">

  <!-- Two bg layers for crossfade -->
  <div class="hero-bg" id="bgA"></div>
  <div class="hero-bg" id="bgB" style="opacity:0;"></div>

  <div class="vignette"></div>

  <!-- Nav -->
  <div class="nav-strip">
    <div class="nav-logo-text">⊞ Eravathody<br>Handloom Society</div>
    <div class="nav-links-row">
      <a class="nav-link" href="#">Home</a>
      <a class="nav-link" href="#">Craft</a>
      <a class="nav-link" href="#">Process</a>
      <a class="nav-link active" href="#">Artisans</a>
      <a class="nav-link" href="#">Products</a>
      <a class="nav-link" href="#">Contact</a>
    </div>
  </div>

  <!-- Artisan info -->
  <div class="artisan-info" id="artisanInfo">
    <p class="info-label" id="infoLabel">Master Weaver</p>
    <div class="info-rule"></div>
    <h2 class="info-name" id="infoName">Sundaram Muda</h2>
    <p class="info-role" id="infoRole">38 Years at the Loom</p>
    <p class="info-bio" id="infoBio">Creator of the Theyyam-inspired saree design that earned the Society district-level recognition.</p>
  </div>

  <!-- Counter -->
  <div class="counter" id="counter">01 / 08</div>

  <!-- Filmstrip -->
  <div class="filmstrip" id="filmstrip"></div>

</div>

<script>
const artisans = [
  {
    name:"Sundaram Muda",
    role:"38 Years at the Loom",
    label:"Master Weaver",
    bio:"Creator of the Theyyam-inspired saree design that earned the Society district-level recognition.",
    img:"https://images.unsplash.com/photo-1605000797499-95a51c5269ae?w=1200&q=80"
  },
  {
    name:"Kamala Devi",
    role:"22 Years · Spinner",
    label:"Thread Preparation",
    bio:"Responsible for preparing warp yarn for all 19 looms. Her consistency in thread tension is known throughout the cluster.",
    img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80"
  },
  {
    name:"Rajan Pillai",
    role:"15 Years · Kasavu Specialist",
    label:"Border Weaver",
    bio:"Specialises in the Kasavu zari border technique, integrating complex patterns without slowing production pace.",
    img:"https://images.unsplash.com/photo-1591085686350-798c0f9faa7f?w=1200&q=80"
  },
  {
    name:"Meenakshi Nair",
    role:"28 Years · Inspector",
    label:"Quality & Finishing",
    bio:"Oversees the washing, starching, and folding of each saree. Her eye for quality is the cooperative's last line of assurance.",
    img:"https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200&q=80"
  },
  {
    name:"Govindan Kutty",
    role:"31 Years · Warper",
    label:"Loom Preparation",
    bio:"Masters the warping process — threading thousands of individual ends through heddle and reed for each new setup.",
    img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80"
  },
  {
    name:"Saraswathi Amma",
    role:"19 Years · Weaver",
    label:"Plain Weave",
    bio:"Produces the plain-weave mundu and fabric yardage that forms the bulk of the Society's day-to-day output.",
    img:"https://images.unsplash.com/photo-1605000797499-95a51c5269ae?w=1200&q=80"
  },
  {
    name:"Krishnan Nair",
    role:"42 Years · Senior Weaver",
    label:"Elder of the Loom",
    bio:"The longest-serving member of the cooperative. He learned the craft from the founders and is the keeper of unwritten techniques.",
    img:"https://images.unsplash.com/photo-1591085686350-798c0f9faa7f?w=1200&q=80"
  },
  {
    name:"Devi Menon",
    role:"11 Years · Colour Weaver",
    label:"Colour Innovation",
    bio:"Leads the Society's distinctive colour work — developing new weft palettes that have become a signature of Eravathody cloth.",
    img:"https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200&q=80"
  }
];

let currentIndex = 0;
let bgActive = 'A';

const bgA = document.getElementById('bgA');
const bgB = document.getElementById('bgB');
const infoName = document.getElementById('infoName');
const infoRole = document.getElementById('infoRole');
const infoLabel = document.getElementById('infoLabel');
const infoBio = document.getElementById('infoBio');
const artisanInfo = document.getElementById('artisanInfo');
const counter = document.getElementById('counter');
const filmstrip = document.getElementById('filmstrip');

function setBackground(imgUrl, instant) {
  if (bgActive === 'A') {
    bgB.style.backgroundImage = 'url(' + imgUrl + ')';
    bgB.style.transition = instant ? 'none' : 'opacity 0.55s ease';
    bgB.style.opacity = '1';
    bgA.style.transition = instant ? 'none' : 'opacity 0.55s ease';
    bgA.style.opacity = '0';
    bgActive = 'B';
  } else {
    bgA.style.backgroundImage = 'url(' + imgUrl + ')';
    bgA.style.transition = instant ? 'none' : 'opacity 0.55s ease';
    bgA.style.opacity = '1';
    bgB.style.transition = instant ? 'none' : 'opacity 0.55s ease';
    bgB.style.opacity = '0';
    bgActive = 'A';
  }
}

function activateArtisan(idx, fromHover) {
  currentIndex = idx;
  var a = artisans[idx];

  /* Crossfade background */
  setBackground(a.img, false);

  /* Update text — fade out, swap, fade in */
  artisanInfo.classList.remove('visible');
  setTimeout(function() {
    infoName.textContent = a.name;
    infoRole.textContent = a.role;
    infoLabel.textContent = a.label;
    infoBio.textContent = a.bio;
    artisanInfo.classList.add('visible');
  }, fromHover ? 0 : 200);

  /* Counter */
  var n = idx + 1;
  counter.textContent = (n < 10 ? '0'+n : n) + ' / 0' + artisans.length;

  /* Active thumb */
  var thumbs = filmstrip.querySelectorAll('.thumb');
  for (var t = 0; t < thumbs.length; t++) {
    thumbs[t].classList.toggle('active', t === idx);
  }
}

/* Build filmstrip */
artisans.forEach(function(a, i) {
  var div = document.createElement('div');
  div.className = 'thumb' + (i === 0 ? ' active' : '');
  div.style.backgroundImage = 'url(' + a.img + ')';
  div.addEventListener('mouseenter', function() {
    activateArtisan(i, true);
  });
  filmstrip.appendChild(div);
});

/* Init */
bgA.style.backgroundImage = 'url(' + artisans[0].img + ')';
bgActive = 'A';
artisanInfo.classList.add('visible');
</script>
